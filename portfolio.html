<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taha Shams — Developer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --text: #f0ede8;
    --muted: #6b6b6b;
    --accent: #c8b89a;
    --accent2: #8a7560;
    --border: #222222;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'Outfit', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1.7;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: #0a0a0a; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 4rem;
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s, background 0.3s;
  }
  nav.scrolled {
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(16px);
    border-color: var(--border);
  }
  .nav-logo {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }

  /* HERO — split layout */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 0 4rem;
    gap: 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -20%; left: -10%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(200,184,154,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-left { padding-top: 6rem; }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s forwards 0.2s;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(3rem, 6vw, 6.5rem);
    line-height: 1.0;
    letter-spacing: -0.02em;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.8s forwards 0.4s;
  }
  .hero-title em { font-style: italic; color: var(--accent); }
  .hero-sub {
    margin-top: 2rem;
    font-size: 1rem;
    color: var(--muted);
    max-width: 380px;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.8s forwards 0.6s;
  }
  .hero-cta {
    margin-top: 3rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.8s forwards 0.8s;
  }
  .btn-primary {
    padding: 0.85rem 2.2rem;
    background: var(--accent);
    color: #0a0a0a;
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-primary:hover { opacity: 0.82; transform: translateY(-2px); }
  .btn-ghost {
    font-size: 0.82rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  /* PHOTO — right side */
  .hero-right {
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 6rem;
    opacity: 0;
    animation: fadeIn 1s forwards 0.6s;
  }
  .photo-frame {
    position: relative;
    width: 340px;
    height: 420px;
  }
  .photo-frame::before {
    content: '';
    position: absolute;
    top: 16px; left: 16px;
    right: -16px; bottom: -16px;
    border: 1px solid var(--border);
    z-index: 0;
  }
  .photo-frame::after {
    content: 'Software Developer';
    position: absolute;
    bottom: -2.5rem;
    right: 0;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
    position: relative;
    z-index: 1;
    filter: grayscale(20%) contrast(1.05);
    transition: filter 0.4s;
  }
  .photo-frame img:hover { filter: grayscale(0%) contrast(1.08); }

  .hero-scroll {
    position: absolute;
    left: 4rem;
    bottom: 3rem;
    writing-mode: vertical-rl;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s forwards 1.2s;
    transform: rotate(180deg);
  }
  .hero-scroll::before {
    content: '';
    display: block;
    width: 1px;
    height: 50px;
    background: var(--border);
    margin: 0 auto 1rem;
  }

  /* SECTIONS */
  section { padding: 8rem 4rem; border-top: 1px solid var(--border); }
  .section-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 4rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    max-width: 60px;
  }

  /* ABOUT */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: start;
  }
  .about-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 3.5rem);
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 2rem;
  }
  .about-title em { font-style: italic; color: var(--accent); }
  .about-text { font-size: 1rem; color: var(--muted); line-height: 1.85; margin-bottom: 1.5rem; }

  .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .skill-item {
    padding: 1.2rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .skill-item:nth-child(odd) { padding-right: 2rem; border-right: 1px solid var(--border); }
  .skill-item:nth-child(even) { padding-left: 2rem; }
  .skill-name { font-size: 0.9rem; font-weight: 500; color: var(--text); }
  .skill-type { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.05em; }

  /* PROJECTS */
  .projects-list { display: flex; flex-direction: column; }
  .project-item {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    gap: 3rem;
    align-items: center;
    padding: 2.5rem 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    position: relative;
    transition: padding-left 0.3s;
  }
  .project-item::before {
    content: '';
    position: absolute;
    left: -4rem; right: -4rem; top: 0; bottom: 0;
    background: var(--bg2);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: -1;
  }
  .project-item:hover::before { opacity: 1; }
  .project-num { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }
  .project-title {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 0.4rem;
    transition: color 0.2s;
  }
  .project-item:hover .project-title { color: var(--accent); }
  .project-desc { font-size: 0.87rem; color: var(--muted); line-height: 1.65; }
  .project-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end; }
  .tag {
    font-family: var(--font-mono);
    font-size: 0.66rem;
    color: var(--accent2);
    border: 1px solid var(--border);
    padding: 0.25rem 0.65rem;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s;
  }
  .project-item:hover .tag { border-color: var(--accent2); color: var(--accent); }

  /* CONTACT */
  .contact-inner { max-width: 640px; }
  .contact-title {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 1.5rem;
  }
  .contact-title em { color: var(--accent); font-style: italic; }
  .contact-sub { font-size: 1rem; color: var(--muted); margin-bottom: 3rem; }
  .contact-email {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent2);
    padding-bottom: 4px;
    transition: opacity 0.2s;
  }
  .contact-email:hover { opacity: 0.7; }

  /* FOOTER */
  footer {
    padding: 2.5rem 4rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-text { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; }
  .footer-links { display: flex; gap: 2rem; }
  .footer-links a {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--accent); }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: none; }

  /* MOBILE */
  @media (max-width: 900px) {
    nav { padding: 1.25rem 1.5rem; }
    .nav-links { display: none; }
    .hero { grid-template-columns: 1fr; padding: 8rem 1.5rem 5rem; gap: 3rem; }
    .hero-right { padding-top: 0; }
    .photo-frame { width: 260px; height: 320px; }
    .hero-scroll { display: none; }
    section { padding: 5rem 1.5rem; }
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    .project-item { grid-template-columns: 40px 1fr; gap: 1.5rem; }
    .project-tags { display: none; }
    footer { padding: 2rem 1.5rem; flex-direction: column; gap: 1rem; text-align: center; }
  }
</style>
</head>

<nav id="nav">
  <a href="#" class="nav-logo">ts.dev</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>
